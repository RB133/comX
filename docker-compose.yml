# Local PostgreSQL for development.
# Start with:  npm run db:up   (or: docker compose up -d)
# The DATABASE_URL that matches these defaults is in comX-backend/.env.example:
#   postgresql://comx:comx@localhost:5432/comx
services:
  postgres:
    image: postgres:16-alpine
    container_name: comx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: comx
      POSTGRES_PASSWORD: comx
      POSTGRES_DB: comx
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comx"]
      interval: 5s
      timeout: 5s
      retries: 5
